<!-- Write a HTML document that implements unordered and ordered lists with its type attribute. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>Lists</title>
</head>

<body>
    <h2>Ordered List</h2>
    <ol type="1">
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ol>
    <ol type="A">
        <li>Alice</li>
        <li>Bob</li>
        <li>Charlie</li>
    </ol>
    <ol type="i">
        <li>January</li>
        <li>February</li>
        <li>March</li>
    </ol>
    <ol type="I">
        <li>April</li>
        <li>May</li>
        <li>June</li>
    </ol>
    <h2>Unordered List</h2>
    <ul type="disc">
        <li>James</li>
        <li>John</li>
        <li>Robert</li>
    </ul>
    <ul type="circle">
        <li>Michael</li>
        <li>William</li>
        <li>David</li>
    </ul>
    <ul type="square">
        <li>Richard</li>
        <li>Joseph</li>
        <li>Thomas</li>
    </ul>
</body>

</html>
