<!-- Write a HTML document that contains five img tags with different images. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>Images Demo</title>
    <style>
        img {
            width: 200px;
            height: 150px;
            border: 2px solid black;
            margin: 10px;
        }
    </style>
</head>

<body>
    <img src="../../Pictures/1.jpg" alt="">
    <img src="../../Pictures/2.png" alt="">
    <img src="../../Pictures/3.jpg" alt="">
    <img src="../../Pictures/4.jpg" alt="">
    <img src="../../Pictures/5.jpeg" alt="">
</body>

</html>
