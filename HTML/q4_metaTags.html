<!-- Write a HTML document that implements meta, audio, video and canvas tag in single
document. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="description" content="This is a meta tag example">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tags</title>
</head>

<body>
    <h1>Meta Tags Example</h1>
    <p>This page demonstrates the use of meta tags in HTML.</p>
    <audio src="../../2 soon.mp3" controls>

    </audio>
    <video src="../../sample.mp4" controls height="200" width="300"></video>
    <canvas id="myCanvas" width="200" height="100"></canvas>
</body>
<script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");
    ctx.fillStyle = "blue";
    ctx.fillRect(10, 10, 150, 80);
</script>

</html>
